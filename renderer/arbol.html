<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Árbol</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #ccc;
      position: relative;
      z-index: 200;
      overflow: visible;
    }

    .header h2 {
      margin: 0;
      font-size: 20px;
      color: #1e3a5f;
    }

    #controles {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 10px;
      border-right: 1px solid rgba(30, 58, 95, 0.15);
      overflow: visible;
    }

    .control-group--help {
      position: relative;
    }

    .control-group:last-child {
      border-right: none;
      padding-right: 0;
    }

    #controles button {
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #1e3a5f;
      color: white;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    #controles button:hover {
      background: #2e5a8a;
      transform: translateY(-1px);
    }

    #btnVolver {
      background: #5a6a7a;
    }

    #btnVolver:hover {
      background: #4a5866;
    }

    #zoomLabel {
      min-width: 48px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #1e3a5f;
    }

    #viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #e9ecef;
      cursor: grab;
    }

    #viewport.arrastrando {
      cursor: grabbing;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: white;
    }

    .tooltip-icon {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1e3a5f;
      color: white;
      font-size: 14px;
      cursor: default;
      user-select: none;
    }

    .tooltip-icon:focus {
      outline: 2px solid #2e5a8a;
      outline-offset: 2px;
    }

    .tooltip {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      left: auto;
      transform: translateY(-6px);
      background: #1e3a5f;
      color: #ffffff;
      padding: 12px 16px;
      border-radius: 12px;
      white-space: normal;
      text-align: left;
      width: min(360px, calc(100vw - 32px));
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 1000;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 8px 24px rgba(30, 58, 95, 0.25);
    }

    .tooltip p {
      margin: 0 0 8px;
    }

    .tooltip p:last-child {
      margin-bottom: 0;
    }

    .control-group--help:has(.tooltip-icon:hover) .tooltip,
    .control-group--help:has(.tooltip-icon:focus) .tooltip,
    .control-group--help:has(.tooltip-icon:focus-visible) .tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <div class="header">
    <h2>Árbol de Backtracking</h2>

    <div id="controles">

      <div class="control-group">
        <button id="btnPlay">▶ Play</button>
        <button id="btnPause">⏸ Pause</button>
        <button id="btnReset">🔄 Reiniciar</button>
      </div>

      <div class="control-group">
        <button id="btnZoomOut" title="Alejar">−</button>
        <span id="zoomLabel">100%</span>
        <button id="btnZoomIn" title="Acercar">+</button>
        <button id="btnZoomReset" title="Restablecer vista">⊙</button>
      </div>

      <div class="control-group control-group--help">
        <span class="tooltip-icon" tabindex="0" aria-describedby="arbol-tooltip">?</span>
        <div class="tooltip" id="arbol-tooltip" role="tooltip">
          <p>Arrastra el canvas para moverte. Usa los botones +/− para acercar o alejar.</p>
          <p>Azul: nodos normales. Amarillo: explorando. Verde: solución. Rojo: fallo. Naranja: retroceso.</p>
        </div>
        <button id="btnVolver">⬅ Volver</button>
      </div>

    </div>
  </div>

  <div id="viewport">
    <canvas id="canvas"></canvas>
  </div>

  <script src="arbol.js"></script>
</body>
</html>
